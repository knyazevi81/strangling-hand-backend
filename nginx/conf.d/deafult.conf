# API BACKEND
server {
    listen 80;
    server_name api.savebit.ru www.api.savebit.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.savebit.ru www.api.savebit.ru;

    ssl_certificate /etc/letsencrypt/live/api.savebit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.savebit.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# FRONTEND
server {
    listen 80;
    server_name net.savebit.ru www.net.savebit.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name net.savebit.ru www.net.savebit.ru;

    ssl_certificate /etc/letsencrypt/live/net.savebit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/net.savebit.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}